<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豫见乡旅 - 首页发现</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-200 flex justify-center items-center min-h-screen font-sans">
    <div class="w-full max-w-[400px] h-[850px] bg-gray-50 relative overflow-hidden shadow-2xl sm:rounded-[2.5rem] sm:border-8 border-gray-800 flex flex-col">
        
        <!-- 顶部 Header (薄荷绿渐变) -->
        <div class="bg-gradient-to-br from-emerald-400 to-emerald-500 pt-12 pb-5 px-4 rounded-b-[24px] shadow-sm z-10 shrink-0">
            <div class="flex justify-between items-center text-white mb-4">
                <div class="flex items-center space-x-3">
                    <div class="flex items-center font-medium cursor-pointer">
                        <i class="fa-solid fa-location-dot mr-1.5"></i>
                        <span class="text-sm tracking-wide">郑州市</span>
                    </div>
                    <div class="flex items-center text-xs bg-white/20 px-2 py-1 rounded-full backdrop-blur-sm cursor-pointer">
                        <i class="fa-solid fa-sun mr-1 text-yellow-300"></i>
                        <span>26°C 晴</span>
                    </div>
                </div>
                <div class="relative cursor-pointer">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-emerald-500"></span>
                </div>
            </div>
            <div class="bg-white rounded-2xl flex items-center px-4 py-2.5 shadow-lg shadow-emerald-600/20 cursor-text">
                <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2 shrink-0"></i>
                <input type="text" placeholder="搜索目的地 / 村落 / 美食..." class="flex-1 bg-transparent outline-none text-gray-700 placeholder-gray-400 text-sm" readonly>
                <div class="w-px h-4 bg-gray-200 mx-2"></div>
                <span class="text-emerald-500 text-xs font-medium whitespace-nowrap cursor-pointer">搜索</span>
            </div>
        </div>

        <!-- 可滚动内容区 -->
        <div class="flex-1 overflow-y-auto pb-24 -mt-4 pt-6 px-4 no-scrollbar">
            <!-- Banner -->
            <div class="relative w-full h-36 rounded-2xl overflow-hidden shadow-sm mb-6 cursor-pointer">
                <img src="https://images.unsplash.com/photo-1543097692-f0462002324f?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-4">
                    <h3 class="text-white font-bold tracking-wide">豫见最美乡村</h3>
                    <p class="text-white/80 text-xs mt-1">探索隐藏在河南山水间的诗意</p>
                </div>
            </div>

            <!-- 金刚区 (宫格) -->
            <div class="grid grid-cols-4 gap-y-5 gap-x-2 bg-white rounded-2xl p-4 shadow-[0_4px_20px_rgba(0,0,0,0.03)] mb-6">
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-blue-500 bg-blue-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-map text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">预村况</span></div>
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-emerald-500 bg-emerald-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-route text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">查路线</span></div>
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-orange-500 bg-orange-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-house text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">寻住处</span></div>
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-red-500 bg-red-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-utensils text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">觅美食</span></div>
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-purple-500 bg-purple-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-user-group text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">找搭子</span></div>
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-pink-500 bg-pink-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-wand-magic-sparkles text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">享特色</span></div>
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-cyan-500 bg-cyan-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-book-open text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">探研学</span></div>
                <div class="flex flex-col items-center cursor-pointer group"><div class="w-11 h-11 rounded-full flex items-center justify-center mb-1.5 text-green-500 bg-green-50 group-hover:scale-105 transition-transform"><i class="fa-solid fa-bag-shopping text-lg"></i></div><span class="text-[11px] text-gray-700 font-medium">助农集</span></div>
            </div>

            <!-- Tab 切换 -->
            <div class="flex space-x-6 mb-4 px-1 border-b border-gray-100">
                <button class="text-sm font-bold pb-2 relative text-gray-800">推荐<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-1 bg-emerald-500 rounded-full"></div></button>
                <button class="text-sm font-bold pb-2 relative text-gray-400">附近</button>
                <button class="text-sm font-bold pb-2 relative text-gray-400">最新</button>
            </div>

            <!-- 图文列表 -->
            <div class="space-y-4">
                <div class="bg-white rounded-2xl p-3 flex gap-3 shadow-sm border border-gray-100 cursor-pointer">
                    <div class="w-28 h-28 rounded-xl overflow-hidden shrink-0 relative">
                        <img src="https://images.unsplash.com/photo-1596422846543-75c6fc197f0a?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover">
                        <div class="absolute top-0 left-0 bg-gradient-to-r from-emerald-500 to-emerald-400 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-br-lg"><i class="fa-solid fa-wand-magic-sparkles mr-1 text-[8px]"></i> AI 甄选</div>
                    </div>
                    <div class="flex-1 flex flex-col justify-between py-0.5">
                        <div>
                            <h4 class="font-bold text-gray-800 text-[15px]">樱桃沟风景区</h4>
                            <div class="text-xs mt-1 text-gray-400"><i class="fa-solid fa-star text-[10px] text-orange-400 mr-1"></i><span class="text-orange-500 font-bold mr-1">4.8</span>(1256条点评)</div>
                            <div class="flex gap-1.5 mt-2">
                                <span class="bg-emerald-50 text-emerald-600 text-[10px] px-1.5 py-0.5 rounded-md border border-emerald-100/50">亲子游</span>
                                <span class="bg-emerald-50 text-emerald-600 text-[10px] px-1.5 py-0.5 rounded-md border border-emerald-100/50">特色采摘</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2 text-gray-400 text-[11px]"><div class="flex items-center"><i class="fa-solid fa-location-dot mr-1"></i>距您 2.5km</div><i class="fa-solid fa-chevron-right text-[10px]"></i></div>
                    </div>
                </div>
            </div>
            <div class="text-center text-gray-400 text-xs mt-6 mb-4">- 已经到底啦 -</div>
        </div>

        <!-- 底部导航 -->
        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 pt-2 pb-6 px-6 rounded-b-[24px] z-20">
            <div class="flex justify-between items-center relative">
                <div class="flex flex-col items-center cursor-pointer text-emerald-500"><i class="fa-solid fa-house text-[22px]"></i><span class="text-[10px] font-bold mt-1">首页</span></div>
                <div class="flex flex-col items-center cursor-pointer text-gray-400"><i class="fa-regular fa-compass text-[22px]"></i><span class="text-[10px] font-medium mt-1">发现</span></div>
                <div class="relative -top-5 flex flex-col items-center cursor-pointer"><div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-white border-[3px] border-white ring-1 ring-gray-100 shadow-lg shadow-emerald-500/40"><i class="fa-solid fa-plus text-xl"></i></div><span class="text-[10px] font-medium text-gray-500 mt-1">发布</span></div>
                <div class="flex flex-col items-center cursor-pointer text-gray-400"><i class="fa-regular fa-message text-[22px]"></i><span class="text-[10px] font-medium mt-1">消息</span></div>
                <div class="flex flex-col items-center cursor-pointer text-gray-400"><i class="fa-regular fa-user text-[22px]"></i><span class="text-[10px] font-medium mt-1">我的</span></div>
            </div>
        </div>
    </div>
</body>
</html>
